<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div id="clockContainer">

        <div class="mode world-clock" style="position: relative;">
            <h1 style="text-align: center;">World Clock</h1>
            <div id="time">
                <div id="hours">00</div>
                <span class="colon">:</span>
                <div id="minutes">00</div>
                <span class="colon">:</span>
                <div id="seconds">00</div>
                <div id="meridiem">PM</div>
            </div>
            <div id="others">
                <div id="date">March 16, 2026</div>
                <div id="timezone">PHT</div>
            </div>
        </div>

        <div class="mode alarm-clock hidden" style="position: relative;">
            <h1 style="text-align: center;">Alarm Clock</h1>
            <div class="header" style="display:flex; justify-content: space-between; width: 100%; align-items: center;">
                <h2>Alarms</h2>
                <button class="btn btn-add-alarm" style="border-radius: 50%; width: 40px; height: 40px; padding: 0;">&plus;</button>
            </div>
            <div class="content" id="alarms-list"></div>
        </div>

        <div id="alarm-modal" class="modal hidden">
            <div class="modal-content">
                <h2>Set Alarm</h2>
                <div id="alarm-input">
                    <select id="alarm-hour"></select>:
                    <select id="alarm-minute"></select>
                    <select id="alarm-ampm">
                        <option value="AM">AM</option>
                        <option value="PM">PM</option>
                    </select>
                </div>
                <div class="modal-buttons">
                    <button class="btn btn-cancel" id="alarm-cancel">Cancel</button>
                    <button class="btn btn-save" id="alarm-save">Save</button>
                </div>
            </div>
        </div>

        <div id="alarm-ringing" class="modal hidden">
            <div class="modal-content ringing-content">
                <h2>Alarm!</h2>
                <p id="ringing-time"></p>
                <div class="alarm-ring-buttons">
                    <button class="btn btn-snooze" id="alarm-snooze">Snooze (5 min)</button>
                    <button class="btn btn-dismiss" id="alarm-dismiss">Dismiss</button>
                </div>
            </div>
        </div>

        <div class="mode timer hidden" style="position: relative;">
            <h1 style="text-align: center;">Timer</h1>
            <div id="time">
                <div id="timer-hours" contenteditable="true">00</div>:
                <div id="timer-minutes" contenteditable="true">00</div>:
                <div id="timer-seconds" contenteditable="true">00</div>
            </div>
            <div id="controls">
                <button class="btn btn-start">Start</button>
                <button class="btn btn-pause">Pause</button>
                <button class="btn btn-restart">Restart</button>
            </div>
        </div>

        <div class="mode stopwatch hidden" style="position: relative;">
            <h1 style="text-align: center;">Stopwatch</h1>
            <div id="time">
                <div id="sw-minutes" contenteditable>00</div>:
                <div id="sw-seconds" contenteditable>00</div>:
                <div id="sw-ms" contenteditable>00</div>
            </div>
            <div id="controls">
                <button class="btn btn-start">Start</button>
                <button class="btn btn-pause">Pause</button>
                <button class="btn btn-restart">Restart</button>
                <button class="btn btn-lapse">Lapse</button>
            </div>

            <ul id="laps-list">

            </ul>
        </div>

        <div class="controls">
            <button class="btn active" data-mode="world-clock">World Clock</button>
            <button class="btn" data-mode="alarm-clock">Alarm Clock</button>
            <button class="btn" data-mode="timer">Timer</button>
            <button class="btn" data-mode="stopwatch">Stopwatch</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
